name: validate-channel

on:
  push:
    branches: [dev, main, prod]
    paths: [channel.json, channel.schema.json, scripts/release_tool.py, ".github/workflows/validate-channel.yml"]
  pull_request:
    paths: [channel.json, channel.schema.json, scripts/release_tool.py, ".github/workflows/validate-channel.yml"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate channel manifest
        env:
          EXPECTED_CHANNEL: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
        run: |
          schema=$(jq -r .schema channel.json)
          if [[ "$schema" == mcpgitrelease/channel/v1 ]]; then
            jq -e --arg channel "$EXPECTED_CHANNEL" '.channel == $channel and (.release.source_revision | test("^[0-9a-f]{40}$")) and ([.artifacts[].arch] | sort == ["amd64", "arm64"])' channel.json
          else
            python3 scripts/release_tool.py validate channel.json --channel "$EXPECTED_CHANNEL"
          fi
